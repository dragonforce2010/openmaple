default_provider: e2b
default_agent_runtime_provider: local

e2b:
  api_key: ""
  template: base
  workspace_path: /workspace
  timeout_ms: 3600000
  envs: {}

local_docker:
  image: node:22-bookworm
  networking:
    mode: limited
    allowed_hosts:
      - api.anthropic.com
    allow_mcp_servers: true
    allow_package_managers: true
  sandbox_options:
    - docker
    - colima
    - local_process_fallback

aliyun_fc:
  access_key_id: ""
  access_key_secret: ""
  region: cn-hangzhou
  function_name: ""
  invoke_url: ""
  workspace_path: /workspace
  timeout_ms: 120000
  envs: {}

oss:
  access_key_id: ""
  access_key_secret: ""
  region: cn-hangzhou
  bucket: ""
  endpoint: ""
