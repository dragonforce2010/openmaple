name: Feature request
description: Propose a managed-agent platform capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What platform-team problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should OpenMaple add or change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Agent
        - Session
        - Runtime pool
        - Sandbox
        - Vault or MCP
        - Provider adapter
        - SDK
        - CLI
        - Console
        - Documentation
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or references
      description: Link relevant docs, repos, provider APIs, or real workflow examples.
