name: Bug report
description: Report a reproducible OpenMaple defect.
title: "[Bug]: "
labels: ["bug", "status:needs-repro"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not include secrets, API keys, customer data, or private hostnames.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal steps or commands that reproduce the issue.
      placeholder: |
        1. Run ./scripts/setup-local-docker.sh
        2. Run npm run smoke:local -- --base http://127.0.0.1:27951
        3. Open http://127.0.0.1:8080/
        4. See ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Local Docker trial
        - Console
        - API
        - SDK
        - CLI
        - Runtime provider
        - Sandbox provider
        - Vault or MCP
        - Docker Compose
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Last command that failed
      placeholder: npm run smoke:local -- --base http://127.0.0.1:27951
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Use public-safe logs and real product screenshots only.
      render: text
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.2.1 or commit SHA
