name: CI

on:
  pull_request:
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:
    inputs:
      run_contracts:
        description: Run contract tests
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-1.3.14-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - name: Install dependencies
        run: |
          cat > "$HOME/.bunfig.toml" <<'TOML'
          [install]
          registry = "https://registry.npmjs.org"
          TOML

          install_deps() {
            bun install --frozen-lockfile --registry=https://registry.npmjs.org --network-concurrency=4 --no-progress
          }

          for attempt in 1 2 3; do
            if install_deps; then
              exit 0
            fi
            delay=$((attempt * 15))
            echo "bun install failed; retrying in ${delay}s..."
            sleep "$delay"
          done

          install_deps
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: ignore

  contract-tests:
    name: contract-tests
    needs: quality
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_contracts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-1.3.14-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - name: Install dependencies
        run: |
          cat > "$HOME/.bunfig.toml" <<'TOML'
          [install]
          registry = "https://registry.npmjs.org"
          TOML

          install_deps() {
            bun install --frozen-lockfile --registry=https://registry.npmjs.org --network-concurrency=4 --no-progress
          }

          for attempt in 1 2 3; do
            if install_deps; then
              exit 0
            fi
            delay=$((attempt * 15))
            echo "bun install failed; retrying in ${delay}s..."
            sleep "$delay"
          done

          install_deps
      - run: bun run ci:contracts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-results
          path: test-results
          if-no-files-found: ignore
