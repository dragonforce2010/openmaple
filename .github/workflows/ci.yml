name: CI

on:
  pull_request:
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:
    inputs:
      run_contracts:
        description: Run contract tests
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Check public hygiene
        run: node scripts/check-public-hygiene.mjs
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: ignore

  contract-tests:
    name: contract-tests
    needs: quality
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_contracts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - run: bun run ci:contracts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-results
          path: test-results
          if-no-files-found: ignore
