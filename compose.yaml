services:
  managed-agents-platform:
    build:
      context: .
    image: managed-agents-platform:local
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${MAPLE_PORT:-27951}:27951"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 27951
      SERVE_STATIC: "true"
      MAPLE_DATA_DIR: /app/.managed-agents
      MAPLE_SKILLS_ROOT: /root/.agents/skills
      MAPLE_MYSQL_HOST: mysql
      MAPLE_MYSQL_PORT: 3306
      MAPLE_MYSQL_DATABASE: ${MAPLE_MYSQL_DATABASE:-maple}
      MAPLE_MYSQL_USER: ${MAPLE_MYSQL_USER:-root}
      MAPLE_MYSQL_PASSWORD: ${MAPLE_MYSQL_PASSWORD:-maple}
      MAPLE_DOCKER_WORKSPACE_HOST_ROOT: ${MAPLE_DOCKER_WORKSPACE_HOST_ROOT:-${PWD}/.managed-agents/sessions}
      MAPLE_LOCAL_DOCKER_MODE: "true"
      MAPLE_DEV_LOGIN: ${MAPLE_DEV_LOGIN:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ARK_API_KEY: ${ARK_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      ARK_MODEL: ${ARK_MODEL:-}
      MAPLE_SANDBOX_CONFIG: ${MAPLE_SANDBOX_CONFIG:-/app/sandbox.config.json}
      MAPLE_AGENT_RUNTIME_PROVIDER: ${MAPLE_AGENT_RUNTIME_PROVIDER:-local_docker}
      MAPLE_SANDBOX_PROVIDER: ${MAPLE_SANDBOX_PROVIDER:-local_docker}
      MAPLE_DOCKER_IMAGE: ${MAPLE_DOCKER_IMAGE:-node:22-bookworm}
      E2B_API_KEY: ${E2B_API_KEY:-}
      E2B_TEMPLATE: ${E2B_TEMPLATE:-base}
      E2B_WORKSPACE_PATH: ${E2B_WORKSPACE_PATH:-/workspace}
      E2B_TIMEOUT_MS: ${E2B_TIMEOUT_MS:-3600000}
      MAPLE_LARK_OPENAPI_BASE_URL: ${MAPLE_LARK_OPENAPI_BASE_URL:-}
      MAPLE_LARK_AUTHORIZE_URL: ${MAPLE_LARK_AUTHORIZE_URL:-}
      MAPLE_LARK_APP_ACCESS_TOKEN_URL: ${MAPLE_LARK_APP_ACCESS_TOKEN_URL:-}
      MAPLE_LARK_USER_ACCESS_TOKEN_URL: ${MAPLE_LARK_USER_ACCESS_TOKEN_URL:-}
      MAPLE_LARK_USERINFO_URL: ${MAPLE_LARK_USERINFO_URL:-}
      MAPLE_LARK_APP_ID: ${MAPLE_LARK_APP_ID:-}
      MAPLE_LARK_APP_SECRET: ${MAPLE_LARK_APP_SECRET:-}
      MAPLE_LARK_SCOPE: ${MAPLE_LARK_SCOPE:-}
    volumes:
      - ./.managed-agents:/app/.managed-agents
      - ${HOME}/.agents:/root/.agents
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MAPLE_MYSQL_DATABASE:-maple}
      MYSQL_ROOT_PASSWORD: ${MAPLE_MYSQL_PASSWORD:-maple}
    ports:
      - "${MAPLE_MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  mysql_data:
