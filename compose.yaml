x-openmaple-image: &openmaple-image
  build:
    context: .
  image: openmaple:local

services:
  api:
    <<: *openmaple-image
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${MAPLE_API_PORT:-27951}:27951"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 27951
      SERVE_STATIC: "false"
      MAPLE_DATA_DIR: /app/.managed-agents
      MAPLE_SKILLS_ROOT: /root/.agents/skills
      MAPLE_MYSQL_HOST: mysql
      MAPLE_MYSQL_PORT: 3306
      MAPLE_MYSQL_DATABASE: ${MAPLE_MYSQL_DATABASE:-maple}
      MAPLE_MYSQL_USER: ${MAPLE_MYSQL_USER:-root}
      MAPLE_MYSQL_PASSWORD: ${MAPLE_MYSQL_PASSWORD:-maple}
      MAPLE_DOCKER_WORKSPACE_HOST_ROOT: ${MAPLE_DOCKER_WORKSPACE_HOST_ROOT:-${PWD}/.managed-agents/sessions}
      MAPLE_LOCAL_DOCKER_MODE: "true"
      MAPLE_DEV_LOGIN: ${MAPLE_DEV_LOGIN:-true}
      MAPLE_WEB_BASE_URL: ${MAPLE_WEB_BASE_URL:-http://127.0.0.1:${MAPLE_WEB_PORT:-8080}}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ARK_API_KEY: ${ARK_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      ARK_MODEL: ${ARK_MODEL:-}
      MAPLE_AGENT_RUNTIME_PROVIDER: ${MAPLE_AGENT_RUNTIME_PROVIDER:-local_docker}
      MAPLE_SANDBOX_PROVIDER: ${MAPLE_SANDBOX_PROVIDER:-local_docker}
      MAPLE_DOCKER_IMAGE: ${MAPLE_DOCKER_IMAGE:-node:22-bookworm}
    volumes:
      - ./.managed-agents:/app/.managed-agents
      - ${HOME}/.agents:/root/.agents
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:27951/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  web:
    <<: *openmaple-image
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${MAPLE_WEB_PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
      MAPLE_WEB_STATIC_DIR: /app/dist
      MAPLE_API_PROXY_TARGET: http://api:27951
      MAPLE_DEV_API_KEY: ${MAPLE_DEV_API_KEY:-maple_dev_key}
    command: ["bun", "apps/control-plane-api/src/web/web.ts"]
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MAPLE_MYSQL_DATABASE:-maple}
      MYSQL_ROOT_PASSWORD: ${MAPLE_MYSQL_PASSWORD:-maple}
    ports:
      - "${MAPLE_MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  mysql_data:
